server {
    listen 80;
    server_name archivoalsil.com www.archivoalsil.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name archivoalsil.com www.archivoalsil.com;

    ssl_certificate /etc/letsencrypt/live/archivoalsil.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/archivoalsil.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Límite de tamaño para uploads (100MB)
    client_max_body_size 100M;

    # Archivos estáticos (imágenes/videos subidos)
    location /uploads/ {
        alias /var/www/archivo-alsil/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Archivos estáticos de Next.js
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Todo lo demás va a Next.js
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
